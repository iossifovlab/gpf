schema_version: 1

context:
  name: gpf-core
  version: ${{ env.get("VCS_VERSION") | default("0.0.0.dev0") }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # `uv build` writes a `.gitignore` with `*` into the dist dir; rattler-build
  # honours .gitignore by default and would skip every wheel/sdist, so we
  # opt out here.
  - path: ../../dist/core
    use_gitignore: false
  - path: ../../LICENSE

build:
  noarch: python
  number: 0
  script:
    interpreter: bash
    content: |
      set -euo pipefail
      ls -la
      "$PYTHON" -m pip install --no-deps --no-build-isolation -vv ./*.whl

requirements:
  host:
    - python >=3.12
    - pip
  run:
    - python >=3.12
    - apsw >=3.52
    - cerberus >=1.3
    - dask >=2026.1
    - dask-jobqueue >=0.9
    - deprecation >=2.1
    - distributed >=2026.1
    - docker-py >=7.1
    - duckdb >=1.5,<2
    - filelock >=3.19
    - fsspec >=2026.2
    - gain-core
    - intervaltree
    - jinja2 >=3.1
    - lark >=1.2
    - markdown2 >=2.4
    - matplotlib-base >=3.8
    - networkx >=3.6
    - numpy >=2.2,<3
    - pandas >=2.2,<3
    - psutil
    - pyarrow >=18
    - pybigwig >=0.3
    - pydantic >=2.8,<3
    - pyliftover >=0.4
    - pysam >=0.23
    - python-box >=7.1
    - pyyaml >=6
    - requests >=2.32
    - s3fs >=2026.2
    - scikit-learn >=1.5
    - scipy >=1.15
    - seaborn >=0.13
    - sentry-sdk >=2.12
    - sqlglot >=28,<29
    - toml >=0.10
    - toolz >=0.12

about:
  homepage: https://github.com/iossifovlab/gpf
  summary: GPF — Genotypes and Phenotypes in Families (core library)
  license: MIT
  license_file: LICENSE
