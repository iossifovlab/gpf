# This file may be used to create an environment using:
# $ conda env create --name <env> --file <this file>
# platform: linux-64
# conda create -c conda-forge -c bioconda -n <env name> --file <this file>
#
# Constraints here MIRROR the [project.dependencies] of the workspace
# pyproject.toml files (core/, web_api/, federation/, rest_client/) —
# same floors, same upper bounds. pyproject.toml is the source of
# truth; this file is the conda projection of it.
#
# Deliberately expressed as floors (>=), NOT exact (=) pins. The old
# exact pins silently froze this env at versions the project had long
# moved past (django=5.2.5, numpy=2.2.6, lark=1.2.2, ...) because
# nothing re-derives them when pyproject/uv.lock move. Floors track
# pyproject by construction and cannot rot the same way.
#
# Entries below with no pyproject counterpart are conda-only (system
# tooling, build pins) and are flagged as such.

name: gpf
channels:
  - conda-forge
  - bioconda
  - iossifovlab
dependencies:
  # requires-python
  - python=3.12

  # --- core/pyproject.toml [project.dependencies] ---
  - pysam>=0.23
  - pyliftover>=0.4
  - pybigwig>=0.3
  - lark>=1.2
  - filelock>=3.19
  - networkx>=3.6
  - numpy>=2.2,<3
  - scipy>=1.15
  - pandas>=2.2,<3
  - pyarrow>=18
  - scikit-learn>=1.5
  # matplotlib-base: the headless conda build of `matplotlib`
  - matplotlib-base>=3.8
  - seaborn>=0.13
  - fsspec>=2026.2
  - s3fs>=2026.2
  - dask>=2026.1
  - dask-jobqueue>=0.9
  - distributed>=2026.1
  - python-box>=7.1
  - apsw>=3.52
  - deprecation>=2.1
  - toml>=0.10
  - cerberus>=1.3
  - jinja2>=3.1
  - pyyaml>=6
  - toolz>=0.12
  - markdown2>=2.4
  # python-duckdb: the conda name for the `duckdb` Python package
  - python-duckdb>=1.5,<2
  - sqlglot>=28,<29
  - sentry-sdk>=2.12
  - pydantic>=2.8,<3
  - requests>=2.32
  # docker-py: the conda name for the `docker` Python package
  - docker-py>=7.1
  - psutil
  - intervaltree

  # --- web_api/pyproject.toml [project.dependencies] ---
  - django>=5.2,<5.3
  - django-cors-headers>=4.7
  - djangorestframework>=3.16
  - django-oauth-toolkit>=3
  - gunicorn>=22
  - requests-oauthlib>=2
  - importlib_metadata>=8.6
  # web_api [project.optional-dependencies] -> mysql
  - mysqlclient>=2.2

  # --- conda-only: no pyproject counterpart ---
  # htslib/samtools/bcftools are the system binaries behind pysam;
  # pip installs vendor them into the wheel, conda does not.
  - htslib=1.22
  - samtools=1.22
  - bcftools=1.22
  # runtime lib for mysqlclient
  - mysql-common=8.0
  # dask dashboard proxying for local development
  - jupyter-server-proxy=4.4.0
  - setuptools=70.3
  - pip=24.1
  # pin the version of pyopenssl to pass the build
  - pyopenssl=24.2.1

  - pip:
    # ijson on conda-forge only ships v2.x; gpf-federation /
    # gpf-rest-client require >=3.2.
    - ijson>=3.2
