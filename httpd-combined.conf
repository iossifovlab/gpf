## Apache config for the combined gpf-web image.
##
## Adapted from web_ui/httpd.conf for Debian's apache2
## layout (modules at /usr/lib/apache2/modules/, run dirs
## under /var/{run,log}/apache2). The reverse-proxy target
## is 127.0.0.1:9001 because gunicorn runs in the same
## container under supervisord (instead of a separate
## "backend" service like in the docker-compose split-image
## deployment).

ServerRoot "/etc/apache2"
ServerName localhost
Listen 80
User ${APACHE_RUN_USER}
Group ${APACHE_RUN_GROUP}
PidFile ${APACHE_PID_FILE}

LoadModule mpm_event_module       /usr/lib/apache2/modules/mod_mpm_event.so
LoadModule unixd_module           /usr/lib/apache2/modules/mod_unixd.so
LoadModule authz_core_module      /usr/lib/apache2/modules/mod_authz_core.so
LoadModule log_config_module      /usr/lib/apache2/modules/mod_log_config.so
LoadModule mime_module            /usr/lib/apache2/modules/mod_mime.so
LoadModule dir_module             /usr/lib/apache2/modules/mod_dir.so
LoadModule alias_module           /usr/lib/apache2/modules/mod_alias.so
LoadModule headers_module         /usr/lib/apache2/modules/mod_headers.so
LoadModule filter_module          /usr/lib/apache2/modules/mod_filter.so
LoadModule deflate_module         /usr/lib/apache2/modules/mod_deflate.so
LoadModule expires_module         /usr/lib/apache2/modules/mod_expires.so
LoadModule rewrite_module         /usr/lib/apache2/modules/mod_rewrite.so
LoadModule remoteip_module        /usr/lib/apache2/modules/mod_remoteip.so
LoadModule proxy_module           /usr/lib/apache2/modules/mod_proxy.so
LoadModule proxy_http_module      /usr/lib/apache2/modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module  /usr/lib/apache2/modules/mod_proxy_wstunnel.so
LoadModule setenvif_module        /usr/lib/apache2/modules/mod_setenvif.so

ErrorLog  /proc/self/fd/2
CustomLog /proc/self/fd/1 common
LogLevel  warn

TypesConfig /etc/mime.types

DocumentRoot "/var/www/html"
<Directory "/var/www/html">
    Options FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html

    # SPA fallback: anything that isn't a real file or
    # directory under /, and isn't headed for /api/, /ws/, or
    # /static/, serves index.html so client-side routing works.
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/ws/
    RewriteCond %{REQUEST_URI} !^/static/
    RewriteRule ^ /index.html [L]
</Directory>

# Django admin / DRF static — baked into the image at build
# time by collectstatic in the upstream gpf-web-ui image,
# carried over via the COPY in Dockerfile.production.
Alias /static/ "/var/www/html/static/"
<Directory "/var/www/html/static/">
    Options FollowSymLinks
    AllowOverride None
    Require all granted
    ExpiresActive On
    ExpiresDefault "access plus 1 year"
    Header set Cache-Control "public, immutable"
</Directory>

# Long cache on hashed Angular assets, no-cache on
# index.html so a deploy is picked up immediately.
<Files "index.html">
    Header set Cache-Control "no-store, no-cache, must-revalidate"
</Files>
<FilesMatch "\.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$">
    ExpiresActive On
    ExpiresDefault "access plus 1 year"
    Header set Cache-Control "public, immutable"
</FilesMatch>

# Reverse-proxy /api/ to the in-container gunicorn.
ProxyPreserveHost On
ProxyRequests Off
RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
ProxyPass        /api/ http://127.0.0.1:9001/api/
ProxyPassReverse /api/ http://127.0.0.1:9001/api/

# WebSockets via mod_proxy_wstunnel.
ProxyPass        /ws/ ws://127.0.0.1:9001/ws/
ProxyPassReverse /ws/ ws://127.0.0.1:9001/ws/

# Compression for text types.
AddOutputFilterByType DEFLATE \
    text/plain text/html text/css text/xml \
    application/javascript application/json image/svg+xml
