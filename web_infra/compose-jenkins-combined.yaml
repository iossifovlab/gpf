# Combined-mode overlay for the gpf-web e2e Jenkins pipeline.
# Use with the shared base:
#
#   docker compose -f compose-jenkins.yaml -f compose-jenkins-combined.yaml ...
#
# Defines a single `frontend` service that runs the supervisord
# combined image (Dockerfile.production at the repo root):
# gunicorn on 127.0.0.1:9001 + Apache on :80 in one container.
# This is the single-artefact deployment shape — what
# production actually ships. Apache's reverse-proxy lives
# inside the same network namespace as gunicorn, so the
# `backend` hostname from split mode has no analogue here:
# /api/ and /ws/ resolve to localhost:9001 internally.
#
# Same compose service name (`frontend`) and same hostname
# (`frontend`) as split mode's outward-facing service so that
# `e2e-tests`' depends_on entry in the base compose file is
# resolved identically in both modes and Playwright's
# baseURL works unchanged.

services:

  frontend:
    image: ${COMBINED_IMAGE:-gpf-web-prod:latest}
    hostname: frontend
    # NOTE: unlike `instance-import` (base) and `backend` (split
    # overlay), this service is deliberately NOT switched to the agent
    # uid. The combined image is the production artefact and it needs
    # root: supervisord.conf declares `user=root` and hard-exits with
    # "Can't drop privilege as nonroot user" when started by anyone
    # else (verified), and apache2ctl then has to create
    # /var/run/apache2 and bind :80. Faking that up (a CI-only
    # supervisord.conf + a tmpfs over /run) would mean reshaping the
    # very artefact combined mode exists to test faithfully.
    #
    # Consequence: files this container downloads into the shared GRR
    # cache below are root-owned. That is contained rather than
    # ignored -- the Jenkinsfile chowns ${GRR_CACHE_DIR} back to the
    # agent uid at the start of every build, so the cache is
    # self-healing and the non-root services of the *next* build (or
    # of gain-web-e2e) can still prune and refresh it. Combined mode
    # is also opt-in (STACK_MODE defaults to split), and the cache is
    # largely warmed by the non-root `instance-import` that runs
    # first, so the root-owned residue is a minority of the tree.
    depends_on:
      instance-import:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      # Same writable mount as split mode's backend service
      # — WGPFInstance.__init__ touches main_description.md
      # and about_description.md on first startup if missing
      # (gpf_instance/gpf_instance.py:102-109). instance-import
      # populated the rest of the tree already.
      - ../web_e2e/gpf_e2e_instance:/data
      # Persistent per-agent GRR cache — same mount and same cache_dir
      # (/grr_cache) as the other two GRR-reading services. The
      # combined image bakes a default /grr-definition.yaml pointing
      # at a directory repo under /grr; the GRR_DEFINITION_FILE env
      # var below overrides it to the in-instance http group
      # (grr-sfari.seqpipe.org over grr.seqpipe.org). See the base
      # compose file for the full rationale.
      - ${GRR_CACHE_DIR:-./grr_cache}:/grr_cache
      # Django file logs — gunicorn (under supervisord) writes
      # wdae-debug.log via WDAE_LOG_DIR exactly as the split-
      # mode backend does. See the base compose file's
      # instance-import service for the full rationale.
      - ./wdae-logs:/logs
    environment:
      DJANGO_SETTINGS_MODULE: gpf_web.production_settings
      DAE_DB_DIR: /data
      GRR_DEFINITION_FILE: /data/grr-definition.yaml
      WDAE_DB_NAME: gpf
      WDAE_DB_USER: seqpipe
      WDAE_DB_PASSWORD: secret
      WDAE_DB_HOST: db
      WDAE_DB_PORT: 3306
      WDAE_LOG_DIR: /logs
      WDAE_SECRET_KEY: "django-insecure-e2e-not-a-real-secret-only-for-jenkins"
      WDAE_EMAIL_HOST: mail
      # Same value as split mode: outbound mail's email-
      # verification link points the chromium browser at the
      # combined service via its compose-network hostname.
      WDAE_EMAIL_VERIFICATION_ENDPOINT: "http://frontend"
      WDAE_ALLOWED_HOST: "*"
      WDAE_DEBUG: "False"
      # Override the image's production-default PHENO_IMAGES_DIR
      # (set in Dockerfile.production to /data-phenodb/pheno/images/)
      # to point at the e2e instance's actual image layout. The
      # gpf_e2e_instance/gpf_instance.yaml sets `phenotype_images:
      # '%(wd)s/phenotype_storage/images'`, which resolves to this
      # path under the /data bind mount above. Trailing slash is
      # mandatory — Apache concatenates URL suffixes verbatim.
      PHENO_IMAGES_DIR: /data/phenotype_storage/images/
    healthcheck:
      # Hit /api/v3/datasets/ through Apache's reverse-proxy
      # to gunicorn. Stricter than split mode's localhost:9001
      # check: this only goes green when (a) Apache is up,
      # (b) supervisord successfully started gunicorn,
      # (c) gunicorn workers have completed STUDIES_EAGER_LOADING
      # (the tb-hi1 race), and (d) httpd-combined.conf's
      # ProxyPass routes /api/ correctly. A single failure
      # surface for the whole packaging shape.
      #
      # Retries 30 / interval 10s = 5-min budget, mirroring
      # split mode's backend healthcheck — gunicorn warm-up
      # dominates startup time in either shape and Apache's
      # extra hop adds negligible latency.
      #
      # start_period 3600s for the same reason as split mode's
      # backend: on a cold GRR cache the first open() of a resource
      # downloads the whole file over https. Probes that fail inside
      # start_period don't burn retries, so a warm cache still flips
      # healthy on the first probe.
      test: ["CMD", "curl", "-f", "http://localhost/api/v3/datasets/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 3600s
