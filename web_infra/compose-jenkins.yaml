# Shared base for the gpf-web e2e Jenkins pipeline. The two
# production-deployment shapes — separate backend+frontend
# containers vs. a single supervisord-managed combined image —
# are layered on top of this file via:
#
#   docker compose -f compose-jenkins.yaml -f compose-jenkins-split.yaml ...
#   docker compose -f compose-jenkins.yaml -f compose-jenkins-combined.yaml ...
#
# Either overlay defines a service literally named `frontend`
# (compose service name AND hostname). Tests target
# http://frontend in both modes; the distinction is invisible
# to the Playwright suite. The `instance-import` one-shot uses
# ${BACKEND_IMAGE} in both modes — its `wdaemanage` is bit-
# identical to what the combined image bakes in (`COPY --from=
# backend /opt/gpf /opt/gpf` in Dockerfile.production), so
# tying the migration step to the combined image would only
# add weight without changing behaviour.
#
# Unlike gain we collapse `backend-migrate` into a single
# `instance-import` one-shot: import_data.sh runs `wdaemanage
# migrate` first, then imports genotype/phenotype data, then
# seeds the dev users — so the backend has only one dependency
# to wait for. Single ordering invariant; single failure surface
# in the pipeline UI.
#
# The prod images (`$BACKEND_IMAGE`, `$FRONTEND_IMAGE`,
# `$COMBINED_IMAGE`) are expected to already be present
# locally — the parent Jenkinsfile.e2e either pulls them from
# registry.seqpipe.org (master) or builds them from the wheel
# artefacts (branches). On the host outside Jenkins, fall back
# to the `:latest` tags so `docker compose up` works for local
# debugging.

name: gpf-web-e2e
services:

  mysql-data:
    image: busybox:latest
    command: echo "MySQL data only container"

  db:
    # MariaDB rather than mysql:5.7: same wire protocol, the
    # production image already has libmariadb3 for the client
    # side, and the upstream MySQL 5.7 image is EOL.
    image: mariadb:10.11
    restart: always
    volumes_from:
      - mysql-data
    environment:
      MARIADB_DATABASE: gpf
      MARIADB_USER: seqpipe
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: secret
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_bin
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 5
      # Cold init every build: mysql-data declares no volume, so the
      # data dir is ephemeral and MariaDB does a full first-boot
      # bootstrap each run. Under concurrent e2e builds on one agent
      # that can blow past retries*interval (~50s) and get marked
      # unhealthy with no DB fault — gpf-web-e2e #109 failed here on
      # the same SHA that #108 ran green. start_period stops failing
      # checks from counting until init has had time to finish; a
      # fast cold init still flips healthy at once, so the grace is
      # effectively free.
      start_period: 60s

  mail:
    image: axllent/mailpit:latest
    hostname: mail

  # One-shot: runs `wdaemanage migrate`, imports the genotype +
  # phenotype data into gpf_e2e_instance/, generates common
  # reports / gene profiles, and seeds the Playwright dev users.
  # The bind-mount has to be writable: the script rm -rf's
  # several subdirs and rebuilds them. The frontend service
  # mounts the same path read-only (split mode) or writable
  # (combined mode, matching the runtime mount on the split-
  # mode backend service — see WGPFInstance first-startup writes).
  #
  # Stays on $BACKEND_IMAGE in both stack modes: the import
  # script only needs `wdaemanage` + `import_*` CLIs, which
  # are bit-identical between the backend image and the
  # combined image (the latter copies /opt/gpf from the
  # former). Pinning to backend keeps the env / entrypoint
  # surface in one place and avoids dragging supervisord +
  # Apache into a step that doesn't need them.
  instance-import:
    image: ${BACKEND_IMAGE:-gpf-web-api-prod:latest}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../web_e2e/gpf_e2e_instance:/data:rw
      - /mnt/cephfs/seqpipe/grr:/grr
      - /mnt/cephfs/seqpipe/grr_sfari:/grr_sfari
      # Django writes wdae-debug.log under WDAE_LOG_DIR
      # (default_settings.py LOGGING). Bind to a host path the
      # Jenkinsfile archives so the file logs survive `compose
      # down -v` and end up in the build artefacts. Shared with
      # the frontend service in either overlay — instance-import
      # has exited before the frontend starts handling requests,
      # so the writes don't overlap in time. WatchedFileHandler
      # tolerates the file being replaced.
      - ./wdae-logs:/logs
    environment:
      DJANGO_SETTINGS_MODULE: gpf_web.production_settings
      DAE_DB_DIR: /data
      GRR_DEFINITION_FILE: /data/grr-definition.yaml
      WDAE_DB_NAME: gpf
      WDAE_DB_USER: seqpipe
      WDAE_DB_PASSWORD: secret
      WDAE_DB_HOST: db
      WDAE_DB_PORT: 3306
      WDAE_LOG_DIR: /logs
      WDAE_SECRET_KEY: "django-insecure-e2e-not-a-real-secret-only-for-jenkins"
      # tb-nxl: per-worker user pool size. import_data.sh provisions
      # e2e_worker_0..N-1; e2e-tests reads the same value to size
      # Playwright's `workers`. Must stay in sync (one source of truth).
      # #933: default 4 → 8, enabled by the #931 gthread backend (see
      # web_e2e/playwright.config.ts). Overridable via the gpf-web-e2e
      # E2E_WORKER_COUNT build parameter for one-click rollback.
      E2E_WORKER_COUNT: "${E2E_WORKER_COUNT:-8}"
    entrypoint: ["bash", "/data/import_data.sh"]
    restart: "no"

  e2e-tests:
    build:
      context: ../web_e2e
      dockerfile: Dockerfile.playwright
    volumes:
      - ../web_e2e/reports:/app/reports
    depends_on:
      mail:
        condition: service_started
      # Both stack overlays expose a service named `frontend`
      # with a healthcheck that gates SPA + API readiness.
      # In split mode `frontend` reverse-proxies to a separate
      # `backend` service (which the overlay also pulls in via
      # depends_on chain); in combined mode `frontend` runs
      # supervisord with apache+gunicorn in one container.
      # Either way the test target is `http://frontend`.
      frontend:
        condition: service_healthy
    environment:
      CI: "1"
      JENKINS: "1"
      # tb-nxl: matches the value passed to instance-import so
      # Playwright's worker count never exceeds the provisioned pool.
      # #933: default 4 → 8, enabled by the #931 gthread backend (see
      # web_e2e/playwright.config.ts). Overridable via the gpf-web-e2e
      # E2E_WORKER_COUNT build parameter for one-click rollback.
      E2E_WORKER_COUNT: "${E2E_WORKER_COUNT:-8}"
    command: ["npx", "playwright", "test"]
