# Docker-compose stack for the gpf-web e2e Jenkins pipeline.
# Adapted from gain/web_infra/compose-jenkins.yaml; same shape
# (db + mail + instance-import + backend-e2e + frontend-e2e +
# e2e-tests) but wired up for gpf's MariaDB backend and the
# WDAE_* settings envvars exposed by gpf_web.default_settings.
#
# Unlike gain we collapse `backend-e2e-migrate` into a single
# `instance-import` one-shot: import_data.sh runs `wdaemanage
# migrate` first, then imports genotype/phenotype data, then
# seeds the dev users — so backend-e2e has only one dependency
# to wait for. Single ordering invariant; single failure surface
# in the pipeline UI.
#
# The two prod images (`$BACKEND_IMAGE`, `$FRONTEND_IMAGE`) are
# expected to already be present locally — the parent Jenkinsfile
# either pulls them from registry.seqpipe.org (master) or builds
# them from the wheel artefacts (branches). On the host outside
# Jenkins, fall back to the `:latest` tags so `docker compose up`
# works for local debugging.

name: gpf-web-e2e
services:

  mysql-data:
    image: busybox:latest
    command: echo "MySQL data only container"

  db:
    # MariaDB rather than mysql:5.7: same wire protocol, the
    # production image already has libmariadb3 for the client
    # side, and the upstream MySQL 5.7 image is EOL.
    image: mariadb:10.11
    restart: always
    volumes_from:
      - mysql-data
    environment:
      MARIADB_DATABASE: gpf
      MARIADB_USER: seqpipe
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: secret
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_bin
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 5

  mail:
    image: mailhog/mailhog
    hostname: mail

  # One-shot: runs `wdaemanage migrate`, imports the genotype +
  # phenotype data into gpf_e2e_instance/, generates common
  # reports / gene profiles, and seeds the Playwright dev users.
  # The bind-mount has to be writable: the script rm -rf's
  # several subdirs and rebuilds them. backend-e2e then mounts
  # the same path read-only.
  instance-import:
    image: ${BACKEND_IMAGE:-gpf-web-api-prod:latest}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../web_e2e/gpf_e2e_instance:/data:rw
      - /mnt/cephfs/seqpipe/grr:/grr
      - /mnt/cephfs/seqpipe/grr_sfari:/grr_sfari
    environment:
      DJANGO_SETTINGS_MODULE: gpf_web.production_settings
      DAE_DB_DIR: /data
      GRR_DEFINITION_FILE: /data/grr-definition.yaml
      WDAE_DB_NAME: gpf
      WDAE_DB_USER: seqpipe
      WDAE_DB_PASSWORD: secret
      WDAE_DB_HOST: db
      WDAE_DB_PORT: 3306
      WDAE_SECRET_KEY: "django-insecure-e2e-not-a-real-secret-only-for-jenkins"
    entrypoint: ["bash", "/data/import_data.sh"]
    restart: "no"

  backend-e2e:
    image: ${BACKEND_IMAGE:-gpf-web-api-prod:latest}
    # Tests now target the frontend service at http://frontend
    # (web_e2e/tests/utils.ts) — Apache there reverse-proxies
    # /api/ and /ws/ to backend:9001, so the SPA and API share
    # one origin. Backend keeps a literal `backend` hostname
    # because httpd.conf's ProxyPass uses that name.
    hostname: backend
    depends_on:
      instance-import:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      # The gpf instance fixture lives in the e2e module;
      # mount it writable at /data and point gpf-core at it
      # via DAE_DB_DIR. instance-import populated it above.
      # Writable rather than :ro because WGPFInstance.__init__
      # touches main_description.md and about_description.md
      # on first startup if they're missing (gpf_instance/
      # gpf_instance.py:102-109) — same behaviour production
      # deployments rely on; build #12 caught the mismatch.
      - ../web_e2e/gpf_e2e_instance:/data
      # GRR resources mount — same shape as gain's
      # web_infra/compose-jenkins.yaml. The paths are the CSHL
      # Jenkins agents' shared GRR caches; runs on other hosts
      # need to provide equivalent /grr + /grr_sfari or override
      # GRR_DEFINITION_FILE to a different definition. Both
      # mounts are required: the e2e instance fixture's
      # grr-definition.yaml below combines them as a `group`
      # repo with grr_sfari first (overriding overlapping
      # enrichment IDs in grr).
      - /mnt/cephfs/seqpipe/grr:/grr
      - /mnt/cephfs/seqpipe/grr_sfari:/grr_sfari
    environment:
      DJANGO_SETTINGS_MODULE: gpf_web.production_settings
      DAE_DB_DIR: /data
      # The prod image bakes /grr-definition.yaml (single /grr
      # repo, see web/Dockerfile.production). Override here to
      # the in-instance file that defines a group of /grr_sfari +
      # /grr — e2e-only, leaves prod deployments on the single
      # repo. The instance dir is bind-mounted at /data above.
      GRR_DEFINITION_FILE: /data/grr-definition.yaml
      WDAE_DB_NAME: gpf
      WDAE_DB_USER: seqpipe
      WDAE_DB_PASSWORD: secret
      WDAE_DB_HOST: db
      WDAE_DB_PORT: 3306
      WDAE_SECRET_KEY: "django-insecure-e2e-not-a-real-secret-only-for-jenkins"
      WDAE_EMAIL_HOST: mail
      # The email-verification flow ("create user → click link in
      # mail" — exercised by app.spec.ts:188+) embeds this URL into
      # outbound mail. Default is http://localhost:8000, which the
      # Playwright browser inside the e2e network can't reach
      # (chromium loopback ≠ container loopback). Point at the
      # frontend Apache so /api/v3/users/{set,reset}_password
      # resolves through the same proxy as every other API call.
      WDAE_EMAIL_VERIFICATION_ENDPOINT: "http://frontend"
      WDAE_ALLOWED_HOST: "*"
      WDAE_DEBUG: "False"
    # Override Dockerfile.production's ENTRYPOINT (4 workers) with a
    # single-worker gunicorn for e2e. There's a pre-existing race in
    # gpf-web's datasets_api.Dataset.recreate_dataset_perm: it calls
    # `objects.get_or_create(dataset_id=...)` against a model whose
    # dataset_id field has no `unique=True`, so concurrent first-load
    # workers each insert their own row and the next request's get()
    # raises MultipleObjectsReturned (500). E2E hammers the API hard
    # enough to surface this every time. Single worker = no race.
    # The full fix (unique constraint + migration) belongs in
    # gpf-web's datasets_api models and should be tracked separately.
    #
    # Compose `command:` is appended to the image's ENTRYPOINT — so
    # we override `entrypoint:` instead to take full control of argv.
    entrypoint:
      - gunicorn
      - gpf_web.wsgi:application
      - --bind=0.0.0.0:9001
      - --workers=1
      - --timeout=1200
    healthcheck:
      # /api/v3/instance is a URL-include prefix, not an endpoint;
      # the bare path 404s. /api/v3/instance/version is the real
      # leaf route — unauthenticated GET, returns {"version": ...},
      # doesn't require WGPFInstance to be preloaded. Build #13
      # spent ~9 min racking up 404s on the prefix before compose
      # gave up.
      test: ["CMD", "curl", "-f", "http://localhost:9001/api/v3/instance/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-e2e:
    image: ${FRONTEND_IMAGE:-gpf-web-ui-prod:latest}
    hostname: frontend
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

  e2e-tests:
    build:
      context: ../web_e2e
      dockerfile: Dockerfile.playwright
    volumes:
      - ../web_e2e/reports:/app/reports
    depends_on:
      mail:
        condition: service_started
      backend-e2e:
        condition: service_healthy
      frontend-e2e:
        condition: service_healthy
    environment:
      CI: "1"
      JENKINS: "1"
    command: ["npx", "playwright", "test"]
