# Docker-compose stack for the gpf-web e2e Jenkins pipeline.
# Adapted from gain/web_infra/compose-jenkins.yaml; same shape
# (db + mail + backend-e2e + frontend-e2e + e2e-tests) but
# wired up for gpf's MySQL/MariaDB backend and the WDAE_*
# settings envvars exposed by gpf_web.default_settings.
#
# The two prod images (`$BACKEND_IMAGE`, `$FRONTEND_IMAGE`) are
# expected to already be present locally — the parent Jenkinsfile
# either pulls them from registry.seqpipe.org (master) or builds
# them from the wheel artefacts (branches). On the host outside
# Jenkins, fall back to the `:latest` tags so `docker compose up`
# works for local debugging.
#
# TODO(scope = first wired-up build):
#   - The `gpf_e2e_instance/studies/**` content is .gitignore'd
#     and produced at runtime by `web_e2e/gpf_e2e_instance/
#     import_data.sh` (which also seeds the Playwright dev
#     users via `wdaemanage user_create ...`). Add an
#     `instance-import` one-shot service that runs that script
#     after backend-e2e-migrate but before backend-e2e, or bake
#     the imported instance into a small fixture image. Without
#     it, the API will boot but most queries will 404 and
#     login will fail.

name: gpf-web-e2e
services:

  mysql-data:
    image: busybox:latest
    command: echo "MySQL data only container"

  db:
    # MariaDB rather than mysql:5.7: same wire protocol, the
    # production image already has libmariadb3 for the client
    # side, and the upstream MySQL 5.7 image is EOL.
    image: mariadb:10.11
    restart: always
    volumes_from:
      - mysql-data
    environment:
      MARIADB_DATABASE: gpf
      MARIADB_USER: seqpipe
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: secret
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_bin
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 5

  mail:
    image: mailhog/mailhog
    hostname: mail

  # One-shot: runs Django `migrate` against the MariaDB above and
  # exits 0. backend-e2e depends on this completing.
  backend-e2e-migrate:
    image: ${BACKEND_IMAGE:-gpf-web-api-prod:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: gpf_web.production_settings
      WDAE_DB_NAME: gpf
      WDAE_DB_USER: seqpipe
      WDAE_DB_PASSWORD: secret
      WDAE_DB_HOST: db
      WDAE_DB_PORT: 3306
      WDAE_SECRET_KEY: "django-insecure-e2e-not-a-real-secret-only-for-jenkins"
    entrypoint: ["wdaemanage", "migrate", "--noinput"]
    restart: "no"

  backend-e2e:
    image: ${BACKEND_IMAGE:-gpf-web-api-prod:latest}
    # gpf-e2e's playwright.config.ts hard-codes
    # `http://gpf:8080/gpf` as the Jenkins baseURL. Until the
    # config is updated to point at the frontend service, expose
    # the backend under the `gpf` hostname so legacy specs keep
    # resolving. New specs should target `frontend` directly.
    hostname: backend
    depends_on:
      backend-e2e-migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      # The gpf instance fixture lives in the e2e module;
      # mount it read-only at /data and point gpf-core at it
      # via DAE_DB_DIR.
      - ../web_e2e/gpf_e2e_instance:/data:ro
      # GRR resources mount — same shape as gain's
      # web_infra/compose-jenkins.yaml. The path is the CSHL
      # Jenkins agents' shared GRR cache; runs on other hosts
      # need to provide an equivalent /grr or override
      # GRR_DEFINITION_FILE to a different definition.
      - /mnt/cephfs/seqpipe/grr:/grr
    environment:
      DJANGO_SETTINGS_MODULE: gpf_web.production_settings
      DAE_DB_DIR: /data
      # /grr-definition.yaml is baked into the backend image
      # (see web/Dockerfile.production); it points at the /grr
      # mount above.
      GRR_DEFINITION_FILE: /grr-definition.yaml
      WDAE_DB_NAME: gpf
      WDAE_DB_USER: seqpipe
      WDAE_DB_PASSWORD: secret
      WDAE_DB_HOST: db
      WDAE_DB_PORT: 3306
      WDAE_SECRET_KEY: "django-insecure-e2e-not-a-real-secret-only-for-jenkins"
      WDAE_EMAIL_HOST: mail
      WDAE_ALLOWED_HOST: "*"
      WDAE_DEBUG: "False"
    healthcheck:
      # The combined gpf-web image runs gunicorn on loopback
      # 9001 under supervisord; the split gpf-web-api image
      # binds 9001 publicly. Either way 9001 is the canonical
      # backend port.
      test: ["CMD", "curl", "-f", "http://localhost:9001/api/v3/instance"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-e2e:
    image: ${FRONTEND_IMAGE:-gpf-web-ui-prod:latest}
    hostname: frontend
    depends_on:
      backend-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

  e2e-tests:
    build:
      context: ../web_e2e
      dockerfile: Dockerfile.playwright
    volumes:
      - ../web_e2e/reports:/app/reports
    depends_on:
      mail:
        condition: service_started
      backend-e2e:
        condition: service_healthy
      frontend-e2e:
        condition: service_healthy
    environment:
      CI: "1"
      JENKINS: "1"
    command: ["npx", "playwright", "test"]
