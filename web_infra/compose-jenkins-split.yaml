# Split-mode overlay for the gpf-web e2e Jenkins pipeline.
# Use with the shared base:
#
#   docker compose -f compose-jenkins.yaml -f compose-jenkins-split.yaml ...
#
# Adds two services representing the two-container production
# shape: gunicorn-only `backend` and Apache-only `frontend`
# that reverse-proxies /api/ + /ws/ to backend:9001. The
# combined-mode overlay (compose-jenkins-combined.yaml)
# replaces both with one supervisord container that runs the
# same processes side by side; tests treat them identically
# because both overlays expose a service literally named
# `frontend`.

services:

  backend:
    image: ${BACKEND_IMAGE:-gpf-web-api-prod:latest}
    # Agent uid/gid, not root — same rationale as `instance-import`
    # in the base compose file: this service writes into the shared,
    # long-lived GRR cache, and root-owned entries there are ones the
    # `jenkins` user can neither prune nor refresh. gunicorn binds
    # 9001 (unprivileged) and the image needs nothing else from root.
    user: "${AGENT_UID:-0}:${AGENT_GID:-0}"
    # Tests target the frontend service at http://frontend
    # (web_e2e/tests/utils.ts) — Apache there reverse-proxies
    # /api/ and /ws/ to backend:9001, so the SPA and API share
    # one origin. Backend keeps a literal `backend` hostname
    # because httpd.conf's ProxyPass uses that name.
    hostname: backend
    # gpf#931: CI-only gthread gunicorn for the e2e backend.
    # The prod image (web_api/Dockerfile.production) bakes a *sync*
    # gunicorn (--workers 4) as its ENTRYPOINT. Sync workers hold a
    # whole process open for the duration of each SSE variant-query
    # StreamingHttpResponse, so N concurrent streams saturate all 4
    # workers and queue every other request — the "Loading
    # variants..." Mode A timeouts that forced the earlier 16->4
    # Playwright rollback (tb-iuv-fix). gthread serves each stream on
    # a thread instead, giving --workers x --threads = 16-way
    # concurrency at the RAM cost of only 4 eager-loaded processes
    # (STUDIES_EAGER_LOADING loads all studies per *process*). This
    # unblocks the Playwright worker bump in gpf#933.
    #
    # Scoped to CI: we override `entrypoint` here rather than editing
    # the prod image, so dory/production keep the sync model until
    # gthread is adopted there deliberately + load-tested (gpf#932).
    # entrypoint (not command) because the Dockerfile uses ENTRYPOINT
    # with no CMD — a compose `command` would only append args.
    # The duckdb backend is thread-safe under this: every query runs
    # through connection.cursor() (core/gpf/duckdb_storage/
    # duckdb2_variants.py), DuckDB's per-thread-cursor pattern.
    #
    # gpf#933: workers/threads are env-overridable (defaults 4x4 =
    # 16-way) so the gunicorn concurrency can be retuned alongside the
    # Playwright worker count from the gpf-web-e2e build parameters —
    # one-click rollback if a bump reintroduces SSE saturation.
    entrypoint:
      - gunicorn
      - gpf_web.wsgi:application
      - --bind
      - 0.0.0.0:9001
      - --worker-class
      - gthread
      - --workers
      - "${E2E_GUNICORN_WORKERS:-4}"
      - --threads
      - "${E2E_GUNICORN_THREADS:-4}"
      - --timeout
      - "1200"
    depends_on:
      instance-import:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      # The gpf instance fixture lives in the e2e module;
      # mount it writable at /data and point gpf-core at it
      # via DAE_DB_DIR. instance-import populated it above.
      # Writable rather than :ro because WGPFInstance.__init__
      # touches main_description.md and about_description.md
      # on first startup if they're missing (gpf_instance/
      # gpf_instance.py:102-109) — same behaviour production
      # deployments rely on; build #12 caught the mismatch.
      - ../web_e2e/gpf_e2e_instance:/data
      # Persistent per-agent GRR cache — same mount, same cache_dir
      # (/grr_cache) as `instance-import` in the base compose file,
      # which has already warmed most of it by the time this service
      # starts. See the base file for the full rationale.
      - ${GRR_CACHE_DIR:-./grr_cache}:/grr_cache
      # Django file logs (wdae-debug.log via WDAE_LOG_DIR);
      # see the matching mount on instance-import in the base
      # for the full rationale.
      - ./wdae-logs:/logs
    environment:
      DJANGO_SETTINGS_MODULE: gpf_web.production_settings
      DAE_DB_DIR: /data
      # The prod image bakes /grr-definition.yaml (a single
      # directory-backed repo at /grr, see
      # web_api/Dockerfile.production). Override here to the
      # in-instance file that defines the http group of
      # grr-sfari.seqpipe.org + grr.seqpipe.org behind /grr_cache —
      # e2e-only, leaves prod deployments on their on-host GRR. The
      # instance dir is bind-mounted at /data above.
      GRR_DEFINITION_FILE: /data/grr-definition.yaml
      # No passwd entry for the agent uid in the image -> HOME would
      # be `/`, which is not writable. See the base compose file.
      HOME: /tmp
      WDAE_DB_NAME: gpf
      WDAE_DB_USER: seqpipe
      WDAE_DB_PASSWORD: secret
      WDAE_DB_HOST: db
      WDAE_DB_PORT: 3306
      WDAE_LOG_DIR: /logs
      WDAE_SECRET_KEY: "django-insecure-e2e-not-a-real-secret-only-for-jenkins"
      WDAE_EMAIL_HOST: mail
      # The email-verification flow ("create user → click link in
      # mail" — exercised by app.spec.ts:188+) embeds this URL into
      # outbound mail. Default is http://localhost:8000, which the
      # Playwright browser inside the e2e network can't reach
      # (chromium loopback ≠ container loopback). Point at the
      # frontend Apache so /api/v3/users/{set,reset}_password
      # resolves through the same proxy as every other API call.
      WDAE_EMAIL_VERIFICATION_ENDPOINT: "http://frontend"
      WDAE_ALLOWED_HOST: "*"
      WDAE_DEBUG: "False"
    healthcheck:
      # tb-hi1: /api/v3/datasets/ requires WGPFInstance.studies_db
      # to be populated. Previously this was /api/v3/instance/version,
      # which deliberately bypassed WGPFInstance state — but with
      # STUDIES_EAGER_LOADING and --workers 16, each gunicorn worker
      # independently loads all studies at boot. /version answered 200
      # from any worker that had finished its WSGI bootstrap, even
      # while 15 others were still building combined families. compose
      # up --wait flipped green and Playwright started racing the warmup,
      # producing wildly variable timeout-fail counts on the same SHA
      # (#31: 18 fails, #32: 209 fails — pure warmup-vs-traffic race).
      #
      # /api/v3/datasets/ exercises the same code path the SPA's first
      # data XHR hits: the dataset list. A worker only returns 200 here
      # after eager-loading completes for it. Per-worker race remains
      # (the check lands on whichever worker gunicorn picks), so we
      # bump retries to 30 (interval 10s = 5 min budget) so multiple
      # checks have a high probability of catching all 16 workers
      # ready by the time the check stops.
      #
      # gain's compose-jenkins.yaml uses the same pattern:
      # /api/editor/pipeline_status?pipeline_id=pipeline/Clinical_annotation
      # with --max-time 120.
      #
      # start_period is generous because the GRR is now an http repo
      # behind a cache whose unit is a WHOLE FILE, not a byte range:
      # against the old NFS bind a tabix query read a few KB of a
      # score file, but on a cold cache the first open() downloads the
      # entire file. `instance-import` warms most of what the suite
      # touches before this service starts, but eager study loading
      # can still be the first thing to open a given resource. While
      # in start_period a failing probe only marks the container
      # `starting` — it does not burn one of the 30 retries — so this
      # is a budget for a cold GRR, not added latency: a warm cache
      # goes healthy on the first probe and pays nothing. The real
      # ceiling is the Jenkins job timeout.
      test: ["CMD", "curl", "-f", "http://localhost:9001/api/v3/datasets/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 3600s

  frontend:
    image: ${FRONTEND_IMAGE:-gpf-web-ui-prod:latest}
    hostname: frontend
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Read-only mirror of the backend's writable instance mount.
      # Apache needs filesystem access to the phenotype-images
      # directory referenced by PHENO_IMAGES_DIR below (the
      # /static/images/ alias in httpd.conf). Backend keeps write
      # access for the WGPFInstance first-startup file touches;
      # apache only reads.
      - ../web_e2e/gpf_e2e_instance:/data:ro
    environment:
      # Override the image's production-default PHENO_IMAGES_DIR
      # (set in web_ui/Dockerfile.production to
      # /data-phenodb/pheno/images/) to point at the e2e instance's
      # actual image layout under the /data mount above. Matches
      # compose-jenkins-combined.yaml's override. Trailing slash
      # mandatory — Apache concatenates URL suffixes verbatim.
      PHENO_IMAGES_DIR: /data/phenotype_storage/images/
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
