name: federation

services:

  backend:
    build:
      context: ../
      dockerfile: Dockerfile
    volumes:
    - ..:/wd
    environment:
    - DAE_DB_DIR=/wd/gpf_federation/tmp/gpf_instance

    entrypoint: /wd/gpf_federation/scripts/backend/run_gpf.sh

    healthcheck:
      test: ["CMD-SHELL", "curl -X GET http://backend:21010/api/v3/datasets/hierarchy"]
      interval: 10s
      retries: 6
      start_period: 15s
      timeout: 10s

  runner:
    build:
      context: ..
      dockerfile: gpf_federation/Dockerfile.runner
    volumes:
    - ..:/wd
    environment:
      - TEST_REMOTE_HOST=http://backend:21010
    entrypoint: /wd/gpf_federation/scripts/runner/run_tests.sh
    depends_on:
      backend:
        condition: service_healthy

networks:
  main:
