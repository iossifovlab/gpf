# mypy config for the gpf-web project. Extends the root mypy.ini with the
# django plugin. The Jenkinsfile selects this file for the `web` stage via
# `--config-file /workspace/web/mypy.ini`.

[mypy]
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

strict_equality = True
extra_checks = True

check_untyped_defs = True
disallow_untyped_defs = True

exclude = (?x)(
    ^web/gpf_web/docs/conf.py$
    | ^web/conftest\.py$
  )

plugins = numpy.typing.mypy_plugin, mypy_django_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = "gpf_web.mypy_settings"

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-pysam.*]
ignore_missing_imports = True

[mypy-lark.*]
ignore_missing_imports = True

[mypy-pyarrow.*]
ignore_missing_imports = True

