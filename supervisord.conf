; Supervisord config for the combined gpf-web image.
;
; Two foreground processes:
;   - gunicorn: gpf-web Django backend on 127.0.0.1:9001
;   - apache2:  reverse-proxies /api and /ws to gunicorn,
;               serves the Angular SPA + Django static at /
;
; Both children log to stdout/stderr; supervisord forwards them
; so `docker logs` shows the combined output.

[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:gunicorn]
; #932: gthread worker class (--workers 2 --threads 16) — same change as
; web_api/Dockerfile.production. Under STUDIES_EAGER_LOADING RAM scales
; with workers (each process eager-loads all studies), so 2 workers halve
; the footprint vs the prior 4-sync config while 16 threads/process give
; 32-way request concurrency — a single SSE variant stream no longer
; monopolizes a whole process. This is the combined gpf-web-prod image
; production ships.
command=/opt/gpf/bin/gunicorn gpf_web.wsgi:application
    --bind 127.0.0.1:9001
    --worker-class gthread
    --workers 2
    --threads 16
    --timeout 1200
environment=PATH="/opt/gpf/bin:%(ENV_PATH)s",DJANGO_SETTINGS_MODULE=gpf_web.production_settings,PYTHONUNBUFFERED=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=10

[program:apache2]
command=/usr/sbin/apache2ctl -DFOREGROUND
environment=APACHE_RUN_DIR="/var/run/apache2",APACHE_LOG_DIR="/var/log/apache2",APACHE_PID_FILE="/var/run/apache2/apache2.pid",APACHE_RUN_USER="www-data",APACHE_RUN_GROUP="www-data"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
; Apache after gunicorn so the upstream is up by the time the
; first request lands; supervisor doesn't enforce ordering, but
; priority influences startup order within the same group.
priority=20
