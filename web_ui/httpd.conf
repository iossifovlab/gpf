## Apache config for the gpf web_ui production image.
##
## Vhost: serves the Angular SPA from
## `/usr/local/apache2/htdocs/` (with SPA fallback to
## `index.html`), the Django admin / DRF static from
## `/usr/local/apache2/htdocs/static/`, and reverse-proxies
## `/api/` and `/ws/` to the gunicorn process on
## `backend:9001` (compose service name).

ServerRoot "/usr/local/apache2"
ServerName localhost
Listen 80
User daemon
Group daemon

LoadModule mpm_event_module       modules/mod_mpm_event.so
LoadModule unixd_module           modules/mod_unixd.so
LoadModule authz_core_module      modules/mod_authz_core.so
LoadModule log_config_module      modules/mod_log_config.so
LoadModule mime_module            modules/mod_mime.so
LoadModule dir_module             modules/mod_dir.so
LoadModule alias_module           modules/mod_alias.so
LoadModule headers_module         modules/mod_headers.so
LoadModule filter_module          modules/mod_filter.so
LoadModule deflate_module         modules/mod_deflate.so
LoadModule expires_module         modules/mod_expires.so
LoadModule rewrite_module         modules/mod_rewrite.so
LoadModule remoteip_module        modules/mod_remoteip.so
LoadModule proxy_module           modules/mod_proxy.so
LoadModule proxy_http_module      modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module  modules/mod_proxy_wstunnel.so
LoadModule setenvif_module        modules/mod_setenvif.so

ErrorLog  /proc/self/fd/2
CustomLog /proc/self/fd/1 common
LogLevel  warn

TypesConfig conf/mime.types

DocumentRoot "/usr/local/apache2/htdocs"
<Directory "/usr/local/apache2/htdocs">
    Options FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html

    # SPA fallback: anything that isn't a real file or
    # directory under /, and isn't headed for one of the
    # backend-served prefixes, serves index.html so client-side
    # routing works. The exclusion list mirrors the ProxyPass
    # rules below: /api/ + /ws/ + /o/ (OAuth2 toolkit) +
    # /accounts/ (Django login view) + the /static/ Alias.
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/ws/
    RewriteCond %{REQUEST_URI} !^/o/
    RewriteCond %{REQUEST_URI} !^/accounts/
    RewriteCond %{REQUEST_URI} !^/static/
    RewriteRule ^ /index.html [L]
</Directory>

# Django admin / DRF static — baked into the image at build
# time by the django-static stage.
Alias /static/ "/usr/local/apache2/htdocs/static/"
<Directory "/usr/local/apache2/htdocs/static/">
    Options FollowSymLinks
    AllowOverride None
    Require all granted
    ExpiresActive On
    ExpiresDefault "access plus 1 year"
    Header set Cache-Control "public, immutable"
</Directory>

# Long cache on hashed Angular assets, no-cache on
# index.html so a deploy is picked up immediately.
<Files "index.html">
    Header set Cache-Control "no-store, no-cache, must-revalidate"
</Files>
<FilesMatch "\.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$">
    ExpiresActive On
    ExpiresDefault "access plus 1 year"
    Header set Cache-Control "public, immutable"
</FilesMatch>

# Reverse-proxy backend routes to gunicorn.
#   /api/       — REST API.
#   /o/         — OAuth2 toolkit endpoints (authorize, token,
#                 ...). The SPA's log-in button issues a
#                 window.location to /o/authorize/ and the
#                 backend redirects through /accounts/login.
#   /accounts/  — Django auth views: the OAuth2 flow lands the
#                 user on /accounts/login/ for credential entry,
#                 then bounces back to the SPA's /login route
#                 with a code.
ProxyPreserveHost On
ProxyRequests Off
RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}e"
ProxyPass        /api/ http://backend:9001/api/
ProxyPassReverse /api/ http://backend:9001/api/
ProxyPass        /o/ http://backend:9001/o/
ProxyPassReverse /o/ http://backend:9001/o/
ProxyPass        /accounts/ http://backend:9001/accounts/
ProxyPassReverse /accounts/ http://backend:9001/accounts/

# WebSockets via mod_proxy_wstunnel.
ProxyPass        /ws/ ws://backend:9001/ws/
ProxyPassReverse /ws/ ws://backend:9001/ws/

# Compression for text types.
AddOutputFilterByType DEFLATE \
    text/plain text/html text/css text/xml \
    application/javascript application/json image/svg+xml
