<p class="loader-container">
  @if (!loadingFinished) {
    <span>
      <span class="loader"></span>
      @if (!verboseMode) {
        <span>Loading variants...</span>
      }
    </span>
  }
  @if (loadingFinished || verboseMode) {
    <span id="variants-count-span">
      <span>{{ count }}</span>
    </span>
  }
</p>
