<div class="clickable" (click)="emitSort()" class="sorting-button">
  @if (sortState === 0) {
    <span id="bg" class="material-symbols-outlined">unfold_more</span>
  }
  @if (sortState === -1) {
    <span id="asc" class="material-symbols-outlined">expand_less</span>
  }
  @if (sortState === 1) {
    <span id="desc" class="material-symbols-outlined">expand_more</span>
  }
</div>
