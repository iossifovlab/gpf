<div [ngClass]="{ 'fixed-height': !noScrollOptimization }" style="overflow-y: hidden">
  <ng-template [ngTemplateOutlet]="cellContent.contentTemplateRef" [ngTemplateOutletContext]="{ $implicit: data }">
  </ng-template>
  @if (!cellContent.contentTemplateRef) {
    <span [attr.title]="data[cellContent.field]">{{ data[cellContent.field] }}</span>
  }

  @for (child of cellContent.subcontentChildren; track child) {
    <div style="text-align: center">
      <ng-template [ngTemplateOutlet]="child.contentTemplateRef" [ngTemplateOutletContext]="{ $implicit: data }">
      </ng-template>
      @if (!child.contentTemplateRef) {
        <span [attr.title]="data[child.field]">{{ data[child.field] }}</span>
      }
    </div>
  }
</div>
