<div class="container">
  @if ($geneProfilesConfig | async; as config) {
    @for (geneSymbol of geneSymbols; track geneSymbol) {
      <gpf-gene-profiles-single-view
        [config]="config"
        [geneSymbol]="geneSymbol"
        [isInGeneCompare]="geneSymbols.size > 1">
      </gpf-gene-profiles-single-view>
    }
  }
</div>
