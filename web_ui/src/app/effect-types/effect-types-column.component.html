<div class="effectypes-col">
  <em>{{ columnName }}</em>
  @for (effect of effectTypesLabels; track effect) {
    <div class="checkbox">
      <label>
        <input
          #checkbox
          type="checkbox"
          [checked]="effectTypes.has(effect)"
          (change)="checkEffectType(effect, checkbox.checked); $event.stopPropagation()" />
        <span style="margin-left: 5px">{{ effect }}</span>
      </label>
    </div>
  }
</div>
