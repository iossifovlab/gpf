---
# ENRICHMENT_TOOL
- name: "CAMSAP1 affected LGDs and Missense"
  target: "enrichment_tool"
  study: "iossifov_2014"
  cases:
    - name: "CAMSAP1 gene symbol"
      params:
        gene_symbols:
          - "CAMSAP1"

      expected:
        - row_id: "affected_lgds"
          values: ['363', '0', '0.05', '1.00', '27', '0', '3.92e-3', '1.00', '306', '0', '0.04', '1.00', '68', '0', '9.88e-3', '1.00']
        - row_id: "affected_missense"
          values: ['1,510', '1', '0.22', '0.197', '149', '0', '0.02', '1.00', '1,307', '1', '0.19', '0.173', '246', '0', '0.04', '1.00']

- name: "CAMSAP1 affected LGDs with model"
  target: "enrichment_tool"
  study: "iossifov_2014"
  cases:
    - name: "CAMSAP1 gene symbol"
      params:
        gene_symbols:
          - "CAMSAP1"
        models:
          background_model: "coding_len_background_model"
          counting_model: "enrichment_events_counting"

      expected:
        - row_id: "affected_lgds"
          values: ['363', '0', '0.05', '1.00', '27', '0', '3.92e-3', '1.00', '306', '0', '0.04', '1.00', '68', '0', '9.88e-3', '1.00']
        - row_id: "affected_missense"
          values: ['1,510', '1', '0.22', '0.197', '149', '0', '0.02', '1.00', '1,307', '1', '0.19', '0.173', '246', '0', '0.04', '1.00']


- name: "autism candidates from Iossifov PNAS 2015 gene set unaffected LGDs/Missese values"
  target: "enrichment_tool"
  study: "iossifov_2014"
  cases:
    - name: "-"
      params:
        gene_set:
          collection:
            - collection_id: "main"
          set_id: "autism candidates from Iossifov PNAS 2015"

      expected:
        - row_id: "unaffected_lgds"
          values: ['176', '4', '6.24', '0.537', '3', '0', '0.11', '1.00', '84', '2', '2.98', '0.7719', '94', '2, 3.33', '0.7763']
        - row_id: "unaffected_missense"
          values: ['1,070', '48', '37.95', '0.0981', '72', '7', '2.55', '0.0139', '496', '20', '17.59', '0.5425', '615', '32', '21.81', '0.0371']


- name: "denovo LGDs with iossifov affected and unaffected"
  target: "enrichment_tool"
  study: "iossifov_2014"
  cases:
    - name: "-"
      params:
        gene_set:
          collection:
            - collection_id: "denovo"
              affected_status:
                - study_id: "iossifov_2014"
                  affected: "true"
                  unaffected: "true"
          set_id: "lgds"

      expected:
        - row_id: "affected_lgds"
          values: ['363', '363', '19.51', '0.00', '27', '27', '1.45', '5.23e-35', '306', '306', '16.45', '0.00', '68', '68', '3.65', '4.59e-87']


- name: "RVIS rank from 0 to 5 LGDs affected"
  target: "enrichment_tool"
  study: "iossifov_2014"
  cases:
    - name: "-"
      params:
        gene_weight:
          weight_id: "rvis"
          from: 0
          to: 5

      expected:
        - row_id: "affected_lgds"
          values: ['363', '89', '124.11', '8.10e-5', '27', '0', '9.23', '1.70e-5', '306', '79', '104.62', '0.0021', '68', '10', '23.25', '0.0005']
