id: iossifov_2014
conf_dir: .
has_denovo: true
has_cnv: false
has_transmitted: false
genotype_storage:
  id: genotype_duckdb
  tables:
    pedigree: parquet_scan('iossifov_2014/pedigree/pedigree.parquet')
    meta: parquet_scan('iossifov_2014/meta/meta.parquet')
    summary: parquet_scan('iossifov_2014/summary/*.parquet')
    family: parquet_scan('iossifov_2014/family/*.parquet')
genotype_browser:
  enabled: true
enrichment:
  enabled: true
