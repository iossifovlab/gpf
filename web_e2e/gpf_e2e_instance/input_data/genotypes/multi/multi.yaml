id: multi
conf_dir: .
has_denovo: false
has_cnv: false
has_transmitted: true
genotype_storage:
  id: genotype_duckdb
  tables:
    pedigree: parquet_scan('multi/pedigree/pedigree.parquet')
    meta: parquet_scan('multi/meta/meta.parquet')
    summary: parquet_scan('multi/summary/*.parquet')
    family: parquet_scan('multi/family/*.parquet')
genotype_browser:
  enabled: true
