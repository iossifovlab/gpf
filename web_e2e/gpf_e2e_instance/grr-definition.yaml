# GRR definition for the e2e instance. Selected via
# GRR_DEFINITION_FILE=/data/grr-definition.yaml by every GRR-reading
# service in web_infra/compose-jenkins*.yaml. CI-only: it lives in the
# instance dir, not in any image — the production deploys keep using
# the image-baked web_api/scripts/grr-definition.yaml against CSHL's
# own on-host GRR.
#
# Reads node-local, materialized `type: directory` GRRs produced by
# grr-sync in atomic-publish mode (grr-sync#20) and provisioned on the
# agents by seqpipe/infra#71. Each child points at a stable per-repo
# symlink (/grr, /grr_sfari, /grr_seqpipe) that the compose files bind
# **read-only** from the node-local grr-sync LVM root. Byte-range local
# reads (tabix/fasta/bigwig), zero per-build network, no cache. This
# replaces the earlier http+cache group (grr.seqpipe.org behind a
# whole-file /grr_cache), which itself replaced the dead
# /mnt/cephfs NFS binds (piglet's decommissioning).
#
# Two things here are load-bearing:
#
# 1. Child ORDER. `grr_sfari` stays FIRST: a group repo resolves a
#    resource id from the first child that has it, and grr_sfari's
#    enrichment backgrounds deliberately override the same ids in
#    grr. Reordering the children changes behaviour.
#
# 2. Child IDS stay verbatim. `grr.sync` is what gain's CI definition
#    also calls the main GRR, and the node-local trees are laid out by
#    grr-sync under these repo ids. Renaming a child would point it at
#    a tree that isn't synced on the node.
#
# `read_only: true` is valid on FileRepoDefinition (a `type: directory`
# child) and guarantees builds never write into the shared, hardlinked
# grr-sync tree. `cache_dir` is dropped entirely: reads are direct and
# node-local, so there is nothing to cache.
id: "local"
type: group
children:
  - id: "grr_sfari.sync"
    type: directory
    directory: /grr_sfari
    read_only: true
  - id: "grr.sync"
    type: directory
    directory: /grr
    read_only: true
  # grr_seqpipe is LAST on purpose (lowest priority). It exists in the
  # group only to supply resources that neither grr_sfari nor grr have --
  # today just hg38/enrichment/coding_length_ref_gene_v20170601, which the
  # default_configuration.yaml enrichment `selected_background_models`
  # requires and which is absent from iossifovlab/grr entirely (it only
  # ever lived on piglet's decommissioned /mnt/cephfs GRR). grr_seqpipe
  # also carries 7 hg19 gene-model resources that DO overlap grr; putting
  # this child last means grr's versions win those ids, so adding it here
  # cannot shadow anything -- it can only fill the gap. infra#71 syncs
  # grr_seqpipe node-locally alongside the other repos.
  - id: "grr_seqpipe.sync"
    type: directory
    directory: /grr_seqpipe
    read_only: true
