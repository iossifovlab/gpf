common_report:
  enabled: true
  effect_groups:
  - LGDs
  - nonsynonymous
  - UTRs
  effect_types:
  - Nonsense
  - Frame-shift
  - Splice-site
  - Missense
  - No-frame-shift
  - noStart
  - noEnd
  - Synonymous
  - Non coding
  - Intron
  - Intergenic
  - 3'-UTR
  - 5'-UTR
denovo_gene_sets:
  enabled: true
  selected_person_set_collections:
  - status
  standard_criterias:
    effect_types:
      segments:
          LGDs: LGDs
          Missense: missense
          Synonymous: synonymous
    sexes:
      segments:
          Female: F
          Male: M
          Unspecified: U
  recurrency_criteria:
    segments:
      Single:
          start: 1
          end: 2
      Triple:
          start: 3
          end: -1
      Recurrent:
          start: 2
          end: -1
  gene_sets_names:
  - LGDs
  - LGDs.Male
  - LGDs.Female
  - LGDs.Recurrent
  - LGDs.Single
  - LGDs.Triple
  - Missense
  - Missense.Male
  - Missense.Female
  - Missense.Recurrent
  - Missense.Triple
  - Synonymous
  - Synonymous.Male
  - Synonymous.Female
  - Synonymous.Recurrent
  - Synonymous.Triple
enrichment:
  enabled: false
  selected_background_models:
  - hg19/enrichment/coding_length_in_target_ref_gene_v20190211
  - hg19/enrichment/coding_length_ref_gene_v20190211
  - enrichment/samocha_background
  selected_person_set_collections:
  - status
  default_background_model: hg19/enrichment/coding_length_in_target_ref_gene_v20190211
  selected_counting_models:
  - enrichment_gene_counting
  - enrichment_events_counting
  counting:
    enrichment_gene_counting:
      id: enrichment_gene_counting
      name: Counting affected genes
      desc: Counting affected genes
    enrichment_events_counting:
      id: enrichment_events_counting
      name: Counting events
      desc: Counting events
  default_counting_model: enrichment_gene_counting
  effect_types:
  - LGDs
  - missense
  - synonymous
gene_browser:
  enabled: true
  frequency_column: af_allele_freq
  effect_column: effect.worst effect type
  location_column: variant.location
  domain_min: 0.001
  domain_max: 100
