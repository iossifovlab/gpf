id: multi_liftover
conf_dir: .
has_denovo: false
has_cnv: false
has_transmitted: true
genotype_storage:
  id: genotype_duckdb
  tables:
    pedigree: parquet_scan('multi_liftover/pedigree/pedigree.parquet')
    meta: parquet_scan('multi_liftover/meta/meta.parquet')
    summary: parquet_scan('multi_liftover/summary/*.parquet')
    family: parquet_scan('multi_liftover/family/*.parquet')
genotype_browser:
  enabled: true
