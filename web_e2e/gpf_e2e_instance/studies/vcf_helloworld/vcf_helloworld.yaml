id: vcf_helloworld
conf_dir: .
has_denovo: false
has_cnv: false
has_transmitted: true
genotype_browser:
  enabled: true
  column_groups:
    pheno:
      name: Phenotype measures
      columns:
        - age
        - nviq
  columns:
    phenotype:
      age:
        role: prb
        source: instrument_1.age
        name: "Age at evaluation (months)"
      nviq:
        role: prb
        source: instrument_1.iq
        name: "Nonverbal IQ"
  preview_columns:
    - family
    - variant
    - genotype
    - effect
    - gene_scores
    - pheno
phenotype_data: pheno_helloworld
phenotype_tool: true
phenotype_browser: true
enrichment:
  enabled: true
genotype_storage:
  id: genotype_duckdb
  tables:
    pedigree: parquet_scan('vcf_helloworld/pedigree/pedigree.parquet')
    meta: parquet_scan('vcf_helloworld/meta/meta.parquet')
    summary: parquet_scan('vcf_helloworld/summary/*.parquet')
    family: parquet_scan('vcf_helloworld/family/*.parquet')
