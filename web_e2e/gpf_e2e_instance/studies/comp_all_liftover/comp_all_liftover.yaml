id: comp_all_liftover
conf_dir: .
has_denovo: true
has_cnv: false
has_transmitted: true
phenotype_data: comp_pheno
phenotype_tool: true
phenotype_browser: true
genotype_storage:
  id: genotype_duckdb
  tables:
    pedigree: parquet_scan('comp_all_liftover/pedigree/pedigree.parquet')
    meta: parquet_scan('comp_all_liftover/meta/meta.parquet')
    summary: parquet_scan('comp_all_liftover/summary/*.parquet')
    family: parquet_scan('comp_all_liftover/family/*.parquet')
genotype_browser:
  enabled: true
  has_family_filters: true
  has_person_filters: true
  has_family_filters_beta: true
  has_person_filters_beta: true
  family_filters:
    measures:
      name: Proband Pheno Measure
      source_type: continuous
      from: phenodb
      filter_type: multi
      role: prb
