vars:
  instance_id: data_hg19_startup

instance_id: '%(instance_id)s'

genotype_storage:
  default: genotype_duckdb

  storages:
    - id: genotype_inmemory
      dir: "%($DAE_DB_DIR)s/studies"
      storage_type: inmemory
    - id: genotype_duckdb
      storage_type: duckdb_parquet
      base_dir: "%(wd)s/duckdb_storage"

annotation:
  conf_file: "%($DAE_DB_DIR)s/annotation.yaml"


phenotype_data:
  dir: "%($DAE_DB_DIR)s/pheno"


studies:
  dir: "%($DAE_DB_DIR)s/studies"

datasets:
  dir: "%($DAE_DB_DIR)s/datasets"

default_study_config:
  conf_file: "%($DAE_DB_DIR)s/defaultConfiguration.conf"

