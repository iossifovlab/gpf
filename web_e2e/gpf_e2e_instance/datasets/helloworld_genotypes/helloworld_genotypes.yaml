id: helloworld_genotypes
name: Hello World Genotypes
studies:
- denovo_helloworld
- vcf_helloworld
study_type:
- WG
has_complex: true
has_zygosity: true
enabled: true
phenotype_data: pheno_helloworld
phenotype_tool: true
phenotype_browser: true
enrichment:
  enabled: true
genotype_browser:
  has_present_in_child: true
  has_present_in_parent: true
  has_pedigree_selector: true
  variant_types: 
  - sub
  - ins
  - del
  - complex
  selected_variant_types:
  - sub
  - ins
  - del
  - complex
  column_groups:
    pheno:
      name: Phenotype measures
      columns:
        - age
        - nviq
  columns:
    phenotype:
      age:
        role: prb
        source: instrument_1.age
        name: "Age at evaluation (months)"
      nviq:
        role: prb
        source: instrument_1.iq
        name: "Nonverbal IQ"
  preview_columns:
    - family
    - variant
    - genotype
    - effect
    - gene_scores
    - pheno
denovo_gene_sets:
  enabled: false
common_report:
  enabled: false
