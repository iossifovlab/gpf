    <script>
      const getDb = async () => {
        const duckdb = window.duckdbduckdbWasm;
        // @ts-ignore
        if (window._db) return window._db;
        const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();

        // Select a bundle based on browser checks
        const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);

        const worker_url = URL.createObjectURL(
          new Blob([`importScripts("${bundle.mainWorker}");`], {
            type: "text/javascript",
          })
        );

        // Instantiate the asynchronous version of DuckDB-wasm
        const worker = new Worker(worker_url);
        // const logger = null //new duckdb.ConsoleLogger();
        const logger = new duckdb.ConsoleLogger();
        const db = new duckdb.AsyncDuckDB(logger, worker);
        db.config.path = `${window.location.origin}/.CONTENTS.duckdb`
        await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
        await db.open({path: `${window.location.origin}/.CONTENTS.duckdb`, accessMode: duckdb.DuckDBAccessMode.READ_ONLY});
        URL.revokeObjectURL(worker_url);
        window._db = db;
        return db;
      };
    </script>
    <script type="module">
        //import * as duckdbduckdbWasm from "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.1-dev106.0/+esm";
        import * as duckdbduckdbWasm from "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.33.1-dev18.0/+esm";
        window.duckdbduckdbWasm = duckdbduckdbWasm;
        const db = await getDb();

        const conn = await db.connect();
        await conn.query("INSTALL fts; LOAD fts;")
        //await conn.query(`ATTACH '${window.location.origin}/.CONTENTS.duckdb' (READ_ONLY);`)

        window.duckdbConn = conn;

        const all_ids_result = await conn.query("SELECT id FROM contents;")
        window.all_ids = new Set(all_ids_result.toArray().map((row) => row.toJSON().id))

        $("#input-field").on("change", async (e) => {
            const parser = new nearley.Parser(nearley.Grammar.fromCompiled(window.grammar));
            parser.feed(e.target.value)
            if (parser.results.length === 0) {
                $(".contents > tbody > tr").show()
                return;
            }
            const tree = Array.isArray(parser.results[0]) ? parser.results[0][0] : parser.results[0];

            const result = {}
            const addQueries = (read_node, out_node) => {
                if (typeof read_node === "string") {
                    out_node.query = `SELECT id, description, fts_main_contents.match_bm25(id, '${read_node}') AS imprecise_score, fts_main_contents_first.match_bm25(id, '${read_node}') as precise_score, (COALESCE(fts_main_contents.match_bm25(id, '${read_node}'), 0) + COALESCE(fts_main_contents_first.match_bm25(id, '${read_node}'), 0)) as score FROM contents WHERE score IS NOT NULL ORDER BY score desc;`
                }
                else if (read_node.and) {
                    out_node.and = [{}, {}]
                    addQueries(read_node.and[0], out_node.and[0])
                    addQueries(read_node.and[1], out_node.and[1])
                }
                else if (read_node.or) {
                    out_node.or = [{}, {}]
                    addQueries(read_node.or[0], out_node.or[0])
                    addQueries(read_node.or[1], out_node.or[1])
                }
                else if (read_node.not) {
                    out_node.not = {}
                    addQueries(read_node.not, out_node.not)
                }
            }
            addQueries(tree, result);


            $(".contents > tbody > tr").hide()
            $(".searching").show()

            const ids = new Set();

            const filterBySum = ((results) => {
                const lower = Math.min(...results.map((row) => row.score));
                const upper = Math.max(...results.map((row) => row.score));
                const threshold = lower + (0.75 * (upper - lower));
                return results.filter((row) => {
                    return row.score >= threshold
                })
            })

            const filterByPrecise = ((results) => {
                const imprecise_lower = Math.min(...results.map((row) => row.imprecise_score));
                const imprecise_upper = Math.max(...results.map((row) => row.imprecise_score));
                const imprecise_threshold = imprecise_lower + (0.75 * (imprecise_upper - imprecise_lower));
                const precise_lower = Math.min(...results.map((row) => row.precise_score));
                const precise_upper = Math.max(...results.map((row) => row.precise_score));
                const precise_threshold = precise_lower + (0.75 * (precise_upper - precise_lower));
                return results.filter((row) => {
                    let score = row.precise_score;
                    let threshold = precise_threshold;
                    if (score === null) {
                        score = row.imprecise_score;
                        threshold = imprecise_threshold;
                    }
                    return score >= threshold
                })
            })

            const executeQuery = (async (node, collected_ids) => {
                if (node.query) {
                    const result = (await conn.query(node.query)).toArray().map((row) => row.toJSON());
                    console.log(result)
                    const filtered = filterBySum(result);
                    console.log(filtered)
                    const query_ids = new Set(filtered.map((row) => row.id));
                    return query_ids;
                }
                else if (node.and) {
                    const l_ids = await executeQuery(node.and[0]);
                    const r_ids = await executeQuery(node.and[1]);
                    return l_ids.intersection(r_ids);
                }
                else if (node.or) {
                    const l_ids = await executeQuery(node.or[0]);
                    const r_ids = await executeQuery(node.or[1]);
                    return l_ids.union(r_ids);
                }
                else if (node.not) {
                    return window.all_ids.difference(await executeQuery(node.not));
                }
            });

            const displayIds = await executeQuery(result, ids);

            displayIds.forEach((id) => {$(`tbody > tr:contains("${id}")`).show()})
            $(".searching").hide()

        });
        $(".loading").hide()
        $(".search-table").show()
    </script>
