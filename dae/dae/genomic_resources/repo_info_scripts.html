    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="module">
        import sqlite3 from "https://cdn.jsdelivr.net/npm/@sqlite.org/sqlite-wasm@3.51.2-build6/dist/index.mjs";

        const start = async (sqlite3) => {
          const response = await fetch(`${window.location.origin}/.CONTENTS.sqlite3`)
          const arrayBuffer = await response.arrayBuffer()
          const p = await sqlite3.wasm.allocFromTypedArray(arrayBuffer)
          const db = new sqlite3.oo1.DB();
          let deserialize_flags = sqlite3.capi.SQLITE_DESERIALIZE_FREEONCLOSE;
          const rc = await sqlite3.capi.sqlite3_deserialize(db.pointer, 'main', p, arrayBuffer.byteLength, arrayBuffer.byteLength, deserialize_flags);
          await db.checkRc(rc);
          window.sqlite3 = db;
          window.sqlite3.query = (sql) => {
            const rows =  window.sqlite3.exec({sql: sql, returnValue: "resultRows"});
            console.log(`Executed query: ${sql}, got ${rows.length} rows`);
            console.log(rows);
            return rows;
          }
          // window.sqlite3.query = (sql) => {
          //  return window.sqlite3.exec({sql: sql, returnValue: "resultRows"})
          //}
        };

        const initializeSQLite = async () => {
          try {
            console.log('Loading and initializing SQLite3 module...');
            const sqlite3 = await sqlite3InitModule();
            console.log('Done initializing.');
            await start(sqlite3);
          } catch (err) {
            console.error('Initialization error:', err.name, err.message);
          }
        };


        const rowData = {}
        $(".contents > tbody > tr").each((index, row) => {
            const id = $(row).attr("id");
            const children = $(row).find("td");
            rowData[id] = {
                "type": children[0].textContent.trim(),
                "id": children[1].textContent.trim(),
                "version": children[2].textContent.trim(),
                "numberOfFiles": children[3].textContent.trim(),
                "sizeInBytes": children[4].textContent.trim(),
                "summary": children[5].textContent.trim(),
                "url": $(children[1]).children("a").attr("href").trim(),
            };
        })
        window.rowData = rowData;

        function selectPage(page, force = false) {
            if (page === window.currentPage && !force) {
                return;
            }
            const rows = $(".contents > tbody > tr")
            rows.hide();
            let ids = window.pages[page]
            for (const [index, rowId] of ids.entries()) {
                let row = $(rows[index]);
                let rowData = window.rowData[rowId];
                let cells = row.children("td");
                cells[0].textContent = rowData.type;
                $(cells[1]).children("a").attr("href", rowData.url).text(rowData.id);
                cells[2].textContent = rowData.version;
                cells[3].textContent = rowData.numberOfFiles;
                cells[4].textContent = rowData.sizeInBytes;
                cells[5].textContent = rowData.summary;
                row.show();
            }
            window.currentPage = page;
            updateButtons();
        }

        function updateButtons() {
            $(".pageButton").removeClass("active");
            $(".pageButton").removeClass("hide");
            $(`#${window.currentPage}`).addClass("active");
            if (window.currentPage === 0) {
                $("#prev").addClass("hide");
            }
            if (window.currentPage === window.pages.length - 1) {
                $("#next").addClass("hide");
            }

        }

        function refreshData(ids) {
            window.pages = []
            const pageSize = 50;
            for (let progress = 0; progress < ids.length; progress += pageSize) {
                window.pages.push(ids.slice(progress, progress + pageSize))
            }
            refreshPaginationButtons();
            selectPage(0, true);
        }

        function clearPaginationButtons() {
            const pagination = $(".pagination");
            pagination.empty();
        }

        function refreshPaginationButtons() {
            clearPaginationButtons();
            const pagination = $(".pagination");
            const previousButton = $('<button class="pageButton" id="prev"> < </button>');
            previousButton.on("click", () => selectPage(Math.max(0, window.currentPage - 1)));
            pagination.append(previousButton);
            for (let i = 0; i < window.pages.length; i++) {
                const button = $(`<button class="pageButton" id="${i}">${i + 1}</button>`);
                button.on("click", () => selectPage(i));
                pagination.append(button);
            }
            const nextButton = $(`<button class="pageButton" id="next"> > </button>`);
            nextButton.on("click", () => selectPage(Math.min(window.pages.length - 1, window.currentPage + 1)));
            pagination.append(nextButton);
        }

        await initializeSQLite()
        const all_ids_result = window.sqlite3.query("SELECT full_id FROM contents;")
        window.all_ids = new Set(all_ids_result.map((row) => row[0]))

        refreshData(Array.from(window.all_ids))

        $(".loading").hide()
        $(".search-table").show()

        $("#input-field").on("change", async (e) => {
            const newValue = e.target.value.trim();
            if (newValue === "") {
                refreshData(Array.from(window.all_ids))
                return;
            }

            clearPaginationButtons();
            $(".contents > tbody > tr").hide()
            $(".searching").show()

            const ids = new Set();

            try {
                const displayIds = window.sqlite3.query(`SELECT full_id FROM contents WHERE contents MATCH '${newValue}'`).map((row) => row[0]);
                refreshData(displayIds);
            }
            catch (error) {
                console.error("Error during search:", error);
                alert("Search query failed during execution. Debug details are in the console.")
                refreshData(Array.from(window.all_ids))
            }
            finally {
                $(".searching").hide()
            }
        });

    </script>
