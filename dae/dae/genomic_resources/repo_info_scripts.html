    <script>
      const getDb = async () => {
        const duckdb = window.duckdbduckdbWasm;
        // @ts-ignore
        if (window._db) return window._db;
        const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();

        // Select a bundle based on browser checks
        const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);

        const worker_url = URL.createObjectURL(
          new Blob([`importScripts("${bundle.mainWorker}");`], {
            type: "text/javascript",
          })
        );

        // Instantiate the asynchronous version of DuckDB-wasm
        const worker = new Worker(worker_url);
        // const logger = null //new duckdb.ConsoleLogger();
        const logger = new duckdb.ConsoleLogger();
        const db = new duckdb.AsyncDuckDB(logger, worker);
        db.config.path = `${window.location.origin}/.CONTENTS.duckdb`
        await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
        await db.open({path: `${window.location.origin}/.CONTENTS.duckdb`, accessMode: duckdb.DuckDBAccessMode.READ_ONLY});
        URL.revokeObjectURL(worker_url);
        window._db = db;
        return db;
      };
    </script>
    <script type="module">
        //import * as duckdbduckdbWasm from "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.1-dev106.0/+esm";
        import * as duckdbduckdbWasm from "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.33.1-dev18.0/+esm";
        import * from "https://cdn.jsdelivr.net/npm/@sqlite.org/sqlite-wasm@3.51.2-build6/dist/index.mjs";

        const start = (sqlite3) => {
          fetch(`${window.location.origin}/.CONTENTS.sqlite3`)
            .then((response) => response.arrayBuffer())
            .then((arrayBuffer) => {
              const p = sqlite3.wasm.allocFromTypedArray(arrayBuffer)
              const db = new sqlite3.oo1.DB();
              let deserialize_flags = sqlite3.capi.SQLITE_DESERIALIZE_FREEONCLOSE;
              const rc = sqlite3.capi.sqlite3_deserialize(db.pointer, 'main', p, arrayBuffer.byteLength, arrayBuffer.byteLength, deserialize_flags);
              db.checkRc(rc);
              window.sqlite3db = db;
            })
            .catch((error) => {
              console.error("Error fetching or processing the database file:", error);
            });
        };

        const initializeSQLite = async () => {
          try {
            console.log('Loading and initializing SQLite3 module...');
            const sqlite3 = await sqlite3InitModule();
            console.log('Done initializing. Running demo...');
            start(sqlite3);
          } catch (err) {
            console.error('Initialization error:', err.name, err.message);
          }
        };

        initializeSQLite();

        window.duckdbduckdbWasm = duckdbduckdbWasm;
        const db = await getDb();

        const conn = await db.connect();
        await conn.query("INSTALL fts; LOAD fts;")
        //await conn.query(`ATTACH '${window.location.origin}/.CONTENTS.duckdb' (READ_ONLY);`)

        window.duckdbConn = conn;

        const all_ids_result = await conn.query("SELECT full_id FROM contents;")
        window.all_ids = new Set(all_ids_result.toArray().map((row) => row.toJSON().full_id))
        const columns = await conn.query("DESCRIBE contents;")
        window.contents_columns = all_ids_result.toArray().map((row) => row.toJSON().column_name)
        const rowData = {}
        $(".contents > tbody > tr").each((index, row) => {
            const id = $(row).attr("id");
            const children = $(row).find("td");
            rowData[id] = {
                "type": children[0].textContent.trim(),
                "id": children[1].textContent.trim(),
                "version": children[2].textContent.trim(),
                "numberOfFiles": children[3].textContent.trim(),
                "sizeInBytes": children[4].textContent.trim(),
                "summary": children[5].textContent.trim(),
                "url": $(children[1]).children("a").attr("href").trim(),
            };
        })
        window.rowData = rowData;

        function selectPage(page) {
            if (page === window.currentPage) {
                return;
            }
            const rows = $(".contents > tbody > tr")
            rows.hide();
            let ids = window.pages[page]
            for (const [index, rowId] of ids.entries()) {
                let row = $(rows[index]);
                let rowData = window.rowData[rowId];
                let cells = row.children("td");
                cells[0].textContent = rowData.type;
                $(cells[1]).children("a").attr("href", rowData.url).text(rowData.id);
                cells[2].textContent = rowData.version;
                cells[3].textContent = rowData.numberOfFiles;
                cells[4].textContent = rowData.sizeInBytes;
                cells[5].textContent = rowData.summary;
                row.show();
            }
            window.currentPage = page;
            updateButtons();
        }

        function updateButtons() {
            $(".pageButton").removeClass("active");
            $(".pageButton").removeClass("hide");
            $(`#${window.currentPage}`).addClass("active");
            if (window.currentPage === 0) {
                $("#prev").addClass("hide");
            }
            if (window.currentPage === window.pages.length - 1) {
                $("#next").addClass("hide");
            }

        }

        function refreshData(ids) {
            window.pages = []
            const pageSize = 20;
            for (let progress = 0; progress < ids.length; progress += pageSize) {
                window.pages.push(ids.slice(progress, progress + pageSize))
            }
            refreshPaginationButtons();
            selectPage(0);
        }

        function clearPaginationButtons() {
            const pagination = $(".pagination");
            pagination.empty();
        }

        function refreshPaginationButtons() {
            clearPaginationButtons();
            const pagination = $(".pagination");
            const previousButton = $('<button class="pageButton" id="prev"> < </button>');
            previousButton.on("click", () => selectPage(Math.max(0, window.currentPage - 1)));
            pagination.append(previousButton);
            for (let i = 0; i < window.pages.length; i++) {
                const button = $(`<button class="pageButton" id="${i}">${i + 1}</button>`);
                button.on("click", () => selectPage(i));
                pagination.append(button);
            }
            const nextButton = $(`<button class="pageButton" id="next"> > </button>`);
            nextButton.on("click", () => selectPage(Math.min(window.pages.length - 1, window.currentPage + 1)));
            pagination.append(nextButton);
        }

        $("#input-field").on("change", async (e) => {
            const parser = new nearley.Parser(nearley.Grammar.fromCompiled(window.grammar));
            parser.feed(e.target.value)
            if (parser.results.length === 0) {
                refreshData(Array.from(window.all_ids))
                return;
            }
            const tree = Array.isArray(parser.results[0]) ? parser.results[0][0] : parser.results[0];

            const result = {}
            const addQueries = (read_node, out_node) => {
                if (typeof read_node === "string") {
                    out_node.query = `SELECT full_id FROM (SELECT full_id, COALESCE(fts_main_contents.match_bm25(full_id, '${read_node}'), 0) + COALESCE(fts_main_contents_first.match_bm25(full_id, '${read_node}'), 0) as score FROM contents WHERE score > 0 ORDER BY score desc)`
                }
                else if (read_node.precise) {
                    out_node.query = `SELECT full_id FROM (SELECT full_id, COALESCE(fts_main_contents.match_bm25(full_id, '${read_node.precise}'), 0) as score FROM contents WHERE score > 0 ORDER BY score desc)`
                }
                else if (read_node.and) {
                    out_node.and = [{}, {}]
                    addQueries(read_node.and[0], out_node.and[0])
                    addQueries(read_node.and[1], out_node.and[1])
                }
                else if (read_node.or) {
                    out_node.or = [{}, {}]
                    addQueries(read_node.or[0], out_node.or[0])
                    addQueries(read_node.or[1], out_node.or[1])
                }
                else if (read_node.not) {
                    out_node.query = `SELECT full_id FROM (SELECT full_id, COALESCE(fts_main_contents.match_bm25(full_id, '${read_node.not}'), 0) as score FROM contents WHERE score = 0 ORDER BY score desc)`
                }
            }
            addQueries(tree, result);

            clearPaginationButtons();
            $(".contents > tbody > tr").hide()
            $(".searching").show()

            const ids = new Set();

            const filterBySum = ((results) => {
                const lower = Math.min(...results.map((row) => row.score));
                const upper = Math.max(...results.map((row) => row.score));
                const threshold = lower + (0.75 * (upper - lower));
                return results.filter((row) => {
                    return row.score >= threshold
                })
            })

            const filterByPrecise = ((results) => {
                const imprecise_lower = Math.min(...results.map((row) => row.imprecise_score));
                const imprecise_upper = Math.max(...results.map((row) => row.imprecise_score));
                const imprecise_threshold = imprecise_lower + (0.75 * (imprecise_upper - imprecise_lower));
                const precise_lower = Math.min(...results.map((row) => row.precise_score));
                const precise_upper = Math.max(...results.map((row) => row.precise_score));
                const precise_threshold = precise_lower + (0.75 * (precise_upper - precise_lower));
                return results.filter((row) => {
                    let score = row.precise_score;
                    let threshold = precise_threshold;
                    if (score === null) {
                        score = row.imprecise_score;
                        threshold = imprecise_threshold;
                    }
                    return score >= threshold
                })
            })

            const combineQuery = (async (node) => {
                if (node.query) {
                    return node.query
                }
                else if (node.and) {
                    const q1 = await combineQuery(node.and[0]);
                    const q2 = await combineQuery(node.and[1]);
                    return `${q1} INTERSECT ${q2}`
                }
                else if (node.or) {
                    const q1 = await combineQuery(node.or[0]);
                    const q2 = await combineQuery(node.or[1]);
                    return `${q1} UNION ${q2}`
                }
                else if (node.not) {
                    return node.not
                }
            });

            const query = await combineQuery(result)
            const displayIds = (await conn.query(query)).toArray().map((row) => row.toJSON().full_id);

            refreshData(displayIds);

            $(".searching").hide()

        });

        refreshData(Array.from(window.all_ids))

        $(".loading").hide()
        $(".search-table").show()
    </script>
